name: 小鹏游艇新闻追踪

on:
  schedule:
    # UTC 01:00 = 北京时间 09:00
    - cron: '0 1 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  track-news:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r xpeng-yacht-tracker/requirements.txt

      - name: Run news tracker
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECIPIENT: ${{ secrets.EMAIL_RECIPIENT }}
        run: python xpeng-yacht-tracker/xpeng_news_tracker.py

      - name: Commit dedup file
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add xpeng-yacht-tracker/sent_news.json || true
          git diff --staged --quiet || git commit -m "chore: update sent news log [skip ci]"
          git push || true
